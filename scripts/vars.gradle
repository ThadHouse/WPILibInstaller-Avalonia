def varsfile = file("files/wpilibvars.bat")
def varsfilePS = file("files/wpilibvars.ps1")
def varsfilesh = file("files/wpilibvars.sh")
def codefile = file("files/wpilibcode")
def codefileCmd = file("files/wpilibcode.cmd")
def icoFile = file("WPILibInstaller-Avalonia/Assets/wpilib-256.ico")
def codeAppArmorFile = file("files/wpilibcode.AppArmor")
def advantagescopeAppArmorFile = file("files/advantagescope.AppArmor")

def pathfolder = 'wpilibcode'
def iconfolder = 'icons'

ext.varConfigSetup = {
  return new Tuple2({ Task task ->
    task.inputs.property 'pathfolder', pathfolder
  }, { config ->
    config['PathFolder'] = pathfolder
  })
}

ext.varsZipSetup = { AbstractArchiveTask zip->
  zip.inputs.file varsfile
  zip.inputs.file varsfilePS
  zip.inputs.file varsfilesh
  zip.inputs.file icoFile
  zip.inputs.file codefile
  zip.inputs.file codefileCmd
  zip.inputs.file codeAppArmorFile

  if (project.ext.buildClassifier == 'Windows') {
    zip.from (varsfile) {
      into "/$pathfolder"
      rename {
        "wpilibvars${wpilibYear}.bat"
      }
    }

    zip.from (varsfilePS) {
      into "/$pathfolder"
      rename {
        "wpilibvars${wpilibYear}.ps1"
      }
    }

    zip.from (codefileCmd) {
      into "/$pathfolder"
      rename {
        "wpilibcode${wpilibYear}.cmd"
      }
    }
  } else {
    zip.from (varsfilesh) {
      into "/$pathfolder"
      rename {
        "wpilibvars${wpilibYear}.sh"
      }
    }

    zip.from (codefile) {
      into "/$pathfolder"
      rename {
        "wpilibcode${wpilibYear}"
      }
    }
  }

  zip.from (icoFile) {
    into "/$iconfolder"
  }
  
  zip.from (file("icons")) {
    into "/$iconfolder"
  }

  if (project.ext.buildClassifier == 'Linux') {
    zip.from (codeAppArmorFile) {
      into "/$pathfolder/AppArmor"
      rename {
        "wpilibcode"
      }
    }

    zip.from (advantagescopeAppArmorFile) {
      into "/$pathfolder/AppArmor"
      rename {
        "advantagescope"
      }
    }
  }
}
